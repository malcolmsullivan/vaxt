name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install packages + dev deps
        run: pip install -e "packages/vaxt[dev]" -e "packages/vaxt-api[dev]" -e "packages/vaxt-agent[dev]"

      # The prebuilt heritage-grain.duckdb is committed (see .gitignore), so both
      # the MCP client tests and the BrAPI tests run against real data — 27 tables,
      # verified. They skip only if the DB is ever removed.
      - name: Run tests
        env:
          VAXT_DUCKDB_PATH: data/datasets/heritage-grain/heritage-grain.duckdb
          # Fail loud if the committed warehouse is missing instead of silently
          # skipping the DB-backed tests (see tests/test_warehouse_guard.py).
          VAXT_REQUIRE_DB: "1"
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ruff
        run: |
          pip install ruff
          ruff check packages/vaxt/src packages/vaxt-api/src packages/vaxt-agent/src scripts/vaxt eval

  # Deterministic Ask VAXT eval — NO API key. Grades the committed transcripts
  # against DuckDB on every PR: every citation must resolve, every answer must be
  # anchored to the known-correct row, refusals must refuse. Fails loud on missing
  # coverage, so it can never be green while checking nothing.
  eval-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install packages
        run: pip install -e packages/vaxt -e packages/vaxt-agent
      - name: Eval (replay, keyless)
        env:
          VAXT_DUCKDB_PATH: data/datasets/heritage-grain/heritage-grain.duckdb
        run: python eval/run_eval.py --mode replay

  # Wheel packaging — the editable install jobs above never exercise a built
  # wheel, so a broken bundle would sail through green. This builds the wheel,
  # asserts the warehouse is inside it, and proves a turnkey install: a clean env
  # with NO repo checkout and NO env vars must resolve the bundled DB.
  wheel-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          pip install build twine
          python -m build --wheel packages/vaxt --outdir dist
          twine check dist/*.whl
      - name: Assert the warehouse is bundled in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob("dist/*.whl")[0]
          z = zipfile.ZipFile(whl)
          db = [i for i in z.infolist() if i.filename.endswith("vaxt_mcp/data/heritage-grain.duckdb")]
          assert db, "heritage-grain.duckdb not bundled in the wheel"
          assert db[0].file_size > 5_000_000, f"bundled DB suspiciously small: {db[0].file_size}"
          assert any(i.filename.endswith("vaxt_mcp/data/WAREHOUSE.json") for i in z.infolist()), "WAREHOUSE.json missing"
          print(f"OK: bundled {db[0].filename} ({db[0].file_size} bytes)")
          PY
      - name: Turnkey smoke — clean env, no repo, resolves the bundled DB
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/pip install dist/*.whl
          cd /tmp  # away from the repo so cwd-relative resolution cannot find data/
          env -u VAXT_DUCKDB_PATH -u WORKSPACE_ROOT /tmp/clean/bin/python - <<'PY'
          from vaxt_mcp.client import VaxtClient
          h = VaxtClient().health_check()
          assert h["db_source"] == "bundled", h["db_source"]
          assert h["tables"] >= 27, h["tables"]
          assert "warehouse_fingerprint" in h
          print("turnkey OK: db_source=bundled, tables=", h["tables"])
          PY

  # Live Ask VAXT eval — API-gated, manual only (workflow_dispatch). Re-runs the
  # agent against the model and grades fresh output (deterministic + semantic
  # judge). Requires the ANTHROPIC_API_KEY repo secret; asserts it is present so
  # the job fails loud rather than skipping. Manual to bound spend and avoid
  # model-variance failures on every push.
  eval-live:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages
        run: pip install -e packages/vaxt -e packages/vaxt-agent
      - name: Eval (live + semantic judge)
        env:
          VAXT_DUCKDB_PATH: data/datasets/heritage-grain/heritage-grain.duckdb
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$ANTHROPIC_API_KEY" || { echo "ANTHROPIC_API_KEY secret not set"; exit 1; }
          python eval/run_eval.py --mode live --semantic
