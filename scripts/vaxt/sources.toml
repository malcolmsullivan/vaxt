base_url = "https://www.ncei.noaa.gov/pub/data/ghcn/daily"

[source.ghcn_observations.validation]
min_rows = 10000
max_rows = 5000000
numeric_bounds = { tmin_c = [-60, 30], year = [2000, 2030] }

