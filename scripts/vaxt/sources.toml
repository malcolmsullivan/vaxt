]

[source.climate_zones.validation]
min_rows = 16
max_rows = 16
numeric_bounds = { min_temp_c = [-60, 10] }

[source.crop_wild_relatives]
name = "Crop Wild Relatives"
type = "static"
path = "scripts/vaxt/crop_wild_relatives.csv"
table_name = "crop_wild_relatives"
enabled = true
columns.required = [
