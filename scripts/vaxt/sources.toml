# VAXT sources.toml — Declarative manifest for heritage-grain data pipeline
#
# Source types:
#   static  — CSV committed to git, loaded into DuckDB
#   etl     — fetched from remote API, output to data/ dir, then loaded
#
# Validation rules (per source):
#   script         — path to validator script (exit code 0 = pass)
#   min_rows       — minimum row count
#   max_rows       — maximum row count (sanity bound)
#   unique_key     — column that must have no duplicates
#   numeric_bounds — { col = [min, max] }
#   required_values — { col = ["val1", "val2"] }
#
# ETL options (per source):
#   timeout_sec    — subprocess timeout (default: 300; use higher for slow ETLs)

[global]
output_dir = "data/datasets/heritage-grain"
duckdb_path = "data/datasets/heritage-grain/heritage-grain.duckdb"
contact = "malcolm@vav-os.com"
user_agent = "VAV-OS/1.0 (malcolm@vav-os.com) heritage-grain-ETL"

# ---------------------------------------------------------------------------
# Static CSV sources (committed to git under scripts/vaxt/)
# ---------------------------------------------------------------------------

[source.markers]
name = "Cold Tolerance Markers"
type = "static"
path = "scripts/vaxt/cold_tolerance_markers.csv"
table_name = "markers"
enabled = true
columns.required = [
    "species", "locus", "chromosome", "gene", "marker",
    "marker_type", "frost_tolerance_pct", "notes", "source",
]

[source.markers.validation]
script = "scripts/vaxt/validate_markers.py"
min_rows = 80
max_rows = 500
required_values = { species = ["wheat", "barley", "rye", "apple", "grape"] }

[source.varieties]
name = "Nordic Variety Trait Index"
type = "static"
path = "scripts/vaxt/nordic_variety_trait_index.csv"
table_name = "varieties"
enabled = true
columns.required = [
    "variety", "crop", "program", "country",
    "traits", "cold_tolerance_notes", "usda_zone", "source",
]

[source.varieties.validation]
script = "scripts/vaxt/validate_variety_index.py"
min_rows = 100
max_rows = 1000
unique_key = "variety"
required_values = { crop = ["wheat", "rye", "apple"] }

[source.phenotype_records]
name = "Phenotype Template"
type = "static"
path = "scripts/vaxt/phenotype_template.csv"
table_name = "phenotype_records"
enabled = true
columns.required = [
    "record_id", "trial_id", "trial_type", "location", "season",
    "observation_date", "genotype_id", "genotype_name", "species", "crop_type",
]

[source.phenotype_records.validation]
script = "scripts/vaxt/validate_phenotype.py"
min_rows = 15
max_rows = 10000
unique_key = "record_id"

[source.grin_accessions]
name = "GRIN Germplasm Accessions"
type = "static"
path = "scripts/vaxt/grin_accessions.csv"
table_name = "grin_accessions"
enabled = true
columns.required = [
    "pi_number", "species", "common_name", "crop_group",
    "origin_country", "improvement_status", "cold_hardiness_zone",
]

[source.grin_accessions.validation]
min_rows = 25
max_rows = 500
unique_key = "pi_number"
required_values = { crop_group = ["cereal", "fruit", "berry"] }

[source.climate_zones]
name = "USDA Hardiness Zones"
type = "static"
path = "scripts/vaxt/climate_zones.csv"
table_name = "climate_zones"
enabled = true
columns.required = [
