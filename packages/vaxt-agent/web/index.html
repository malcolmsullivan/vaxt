<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ask VAXT</title>
<style>
  :root {
    --bg: #fbfaf7; --panel: #ffffff; --ink: #1c1a17; --muted: #6b6459;
    --line: #e7e2d8; --accent: #7a6a3f; --accent-ink: #3f371f;
    --chip: #f0ece1; --chip-ink: #4a4230; --ok: #3f7a4a; --warn: #9a6a1f;
    --err: #a8412f; --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17150f; --panel: #201d16; --ink: #ece7db; --muted: #a49b88;
      --line: #332e24; --accent: #c9b784; --accent-ink: #e8dcbe;
      --chip: #2a2619; --chip-ink: #d8cfb4; --ok: #7fbf8c;
      --warn: #d6a24a; --err: #e08972;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    border-bottom: 1px solid var(--line); padding: 18px 20px;
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 20px; margin: 0; letter-spacing: -0.01em; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .status { margin-left: auto; font-size: 12px; color: var(--muted); font-family: var(--mono); }
  main { max-width: 820px; margin: 0 auto; padding: 20px; }
  .banner {
    border: 1px solid var(--line); background: var(--panel); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 16px; font-size: 14px; color: var(--muted);
    display: none;
  }
  .banner.show { display: block; }
  .banner.keyless { border-color: var(--warn); color: var(--warn); }
  .banner code { font-family: var(--mono); color: var(--accent-ink); background: var(--chip); padding: 1px 5px; border-radius: 4px; }
  form { display: flex; gap: 10px; margin-bottom: 20px; }
  input[type=text] {
    flex: 1; padding: 12px 14px; font-size: 15px; border: 1px solid var(--line);
    border-radius: 10px; background: var(--panel); color: var(--ink);
  }
  input[type=text]:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  button {
    padding: 12px 18px; font-size: 15px; font-weight: 600; border: 0;
    border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  .activity { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .tool {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    display: flex; gap: 8px; align-items: center;
  }
  .tool .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: none; }
  .tool.err .dot { background: var(--err); }
  .answer {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 20px; white-space: pre-wrap; display: none;
  }
  .answer.show { display: block; }
  .answer.refused { border-color: var(--warn); }
  .cites { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: var(--mono); font-size: 12px; background: var(--chip); color: var(--chip-ink);
    border: 1px solid var(--line); border-radius: 999px; padding: 4px 11px; cursor: pointer;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.open { background: var(--accent); color: #fff; border-color: var(--accent); }
  .rowview {
    margin-top: 10px; border: 1px solid var(--line); border-radius: 10px;
    overflow: hidden; font-size: 13px; display: none;
  }
  .rowview.show { display: block; }
  .rowview .cap { padding: 8px 12px; background: var(--chip); color: var(--muted);
    font-family: var(--mono); font-size: 12px; border-bottom: 1px solid var(--line); }
  .rowview table { border-collapse: collapse; width: 100%; }
  .rowview td { padding: 6px 12px; border-top: 1px solid var(--line); vertical-align: top; }
  .rowview td.k { color: var(--muted); font-family: var(--mono); white-space: nowrap; width: 1%; }
  .rowview td.v { word-break: break-word; }
  .foot { margin-top: 12px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .err-msg { color: var(--err); }
</style>
</head>
<body>
<header>
  <h1>Ask VAXT</h1>
  <span class="sub">grounded, cited answers over the heritage-grain warehouse</span>
  <span class="status" id="status">checking…</span>
</header>
<main>
  <div class="banner" id="banner"></div>
  <form id="form">
    <input type="text" id="q" placeholder="e.g. Which winter wheat varieties tolerate the most cold?" autocomplete="off">
    <button type="submit" id="ask">Ask</button>
  </form>
  <div class="activity" id="activity"></div>
  <div class="answer" id="answer"></div>
</main>
<script>
const $ = (id) => document.getElementById(id);
const statusEl = $("status"), banner = $("banner"), activity = $("activity"),
      answer = $("answer"), form = $("form"), q = $("q"), ask = $("ask");

// ---- health check on load (works with or without a key) ----
(async () => {
  try {
    const r = await fetch("/ready");
    const b = await r.json();
    statusEl.textContent = r.ok ? `warehouse ready · ${b.tables} tables` : "warehouse not ready";
  } catch { statusEl.textContent = "offline"; }
})();

function showBanner(html, keyless) {
  banner.innerHTML = html;
  banner.classList.add("show");
  banner.classList.toggle("keyless", !!keyless);
}
function clearOutput() {
  activity.innerHTML = ""; answer.className = "answer"; answer.innerHTML = "";
  banner.classList.remove("show", "keyless");
}
function addTool(ev) {
  const div = document.createElement("div");
  div.className = "tool" + (ev.error ? " err" : "");
  const n = ev.row_count === 1 ? "1 row" : `${ev.row_count} rows`;
  div.innerHTML = `<span class="dot"></span> calling ${ev.tool}… ${ev.error ? "error: " + ev.error : n}`;
  activity.appendChild(div);
}

// ---- citation chip expansion via /citation ----
async function toggleCite(chip, table, key, holder) {
  const view = holder.__view;
  if (chip.classList.contains("open")) {
    chip.classList.remove("open"); view.classList.remove("show"); return;
  }
  chip.classList.add("open");
  view.innerHTML = `<div class="cap">loading ${table}:${key}…</div>`;
  view.classList.add("show");
  try {
    const r = await fetch(`/citation?table=${encodeURIComponent(table)}&key=${encodeURIComponent(key)}`);
    if (!r.ok) { view.innerHTML = `<div class="cap err-msg">could not resolve ${table}:${key} (${r.status})</div>`; return; }
    const b = await r.json();
    const rows = Object.entries(b.row).map(([k, v]) =>
      `<tr><td class="k">${k}</td><td class="v">${v === null ? "—" : String(v)}</td></tr>`).join("");
    // >=1-row invariant: this is *a* matching row, not necessarily the only one.
    view.innerHTML = `<div class="cap">a matching row in ${table} where ${b.key_column} = ${key}</div><table>${rows}</table>`;
  } catch {
    view.innerHTML = `<div class="cap err-msg">network error resolving ${table}:${key}</div>`;
  }
}

function renderAnswer(t) {
  answer.classList.add("show");
  if (t.refused) answer.classList.add("refused");
  const body = document.createElement("div");
  body.textContent = t.refused ? (t.refusal_reason || t.answer) : t.answer;
  answer.appendChild(body);

  const cites = (t.citations || []);
  if (cites.length) {
    const wrap = document.createElement("div");
    wrap.className = "cites";
    const holder = document.createElement("div");
    holder.__view = document.createElement("div");
    holder.__view.className = "rowview";
    cites.forEach(c => {
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = `${c.table}:${c.key}`;
      chip.onclick = () => toggleCite(chip, c.table, c.key, holder);
      wrap.appendChild(chip);
    });
    answer.appendChild(wrap);
    answer.appendChild(holder.__view);
  }
  if (t.usage && (t.usage.input_tokens || t.usage.output_tokens)) {
    const foot = document.createElement("div");
    foot.className = "foot";
    foot.textContent = `model ${t.model} · ${t.usage.input_tokens || 0} in / ${t.usage.output_tokens || 0} out tokens`;
    answer.appendChild(foot);
  }
}

// ---- minimal SSE parser over a fetch POST body (EventSource can't POST) ----
async function* sseEvents(resp) {
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf("\n\n")) >= 0) {
      const block = buf.slice(0, i); buf = buf.slice(i + 2);
      let event = "message", data = "";
      for (const line of block.split("\n")) {
        if (line.startsWith("event:")) event = line.slice(6).trim();
        else if (line.startsWith("data:")) data += line.slice(5).trim();
      }
      if (data) yield { event, data: JSON.parse(data) };
    }
  }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const question = q.value.trim();
  if (!question) return;
  clearOutput();
  ask.disabled = true;
  try {
    const resp = await fetch("/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ question }),
    });
    if (resp.status === 503) {
      const b = await resp.json().catch(() => ({}));
      if (b.code === "no_key") {
        showBanner(`Answers are off: set <code>ANTHROPIC_API_KEY</code> to enable them. The warehouse, tools, and citations are live — this is a real system with the model turned off, never a fabricated answer.`, true);
      } else {
        showBanner(`Service unavailable: ${b.message || resp.statusText}`);
      }
      return;
    }
    for await (const { event, data } of sseEvents(resp)) {
      if (event === "status") addTool(data);
      else if (event === "answer") renderAnswer(data);
      else if (event === "error") showBanner(`<span class="err-msg">${data.message || "the model API is unavailable; no answer was produced"}</span>`);
    }
  } catch (err) {
    showBanner(`<span class="err-msg">request failed: ${err.message}</span>`);
  } finally {
    ask.disabled = false;
  }
});
</script>
</body>
</html>
