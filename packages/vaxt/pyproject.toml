[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vaxt-mcp"
version = "0.1.0"
description = "VAXT heritage grain MCP server — query varieties, climate, genomics, and sourdough data"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.0",
    "duckdb>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
where = ["src"]
